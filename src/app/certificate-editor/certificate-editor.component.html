<div class="editor-container">
  <!-- Preview Area -->
  <div class="preview-wrapper">
    <div class="preview-page"
         [style.width.px]="700"
         [style.height.px]="previewHeight"
         [class.dragging]="dragging"
         (mousedown)="onMouseDown($event)"
         data-cy="preview-area">

      <!-- Background image layer (stationary) -->
      @if (backgroundImage) {
        <img class="preview-background"
             [src]="backgroundImage"
             alt="Certificate background"
             data-cy="preview-background">
      }

      <!-- Text canvas layer (rendered by pdfMake + PDF.js, offset via CSS translate) -->
      <canvas #previewCanvas
              class="preview-canvas"
              [style.transform]="canvasTranslate"
              data-cy="preview-canvas"></canvas>

      <!-- Loading overlay (first load only) -->
      @if (loading && !hasRendered) {
        <div class="preview-loading" data-cy="preview-loading">
          Generating preview...
        </div>
      }
    </div>

    <!-- Controls -->
    <div class="slider-controls" data-cy="slider-controls">
      <!-- Lock toggles -->
      <div class="lock-row">
        <label class="lock-toggle">
          <input type="checkbox" [(ngModel)]="lockX" data-cy="lock-x">
          <span>Lock X</span>
        </label>
        <label class="lock-toggle">
          <input type="checkbox" [(ngModel)]="lockY" data-cy="lock-y">
          <span>Lock Y</span>
        </label>
      </div>

      <div class="slider-row">
        <label for="x-offset-slider">X Offset:</label>
        <input id="x-offset-slider"
               type="range"
               [min]="-maxXOffset"
               [max]="maxXOffset"
               [ngModel]="xOffset"
               (ngModelChange)="onXOffsetChange($event)"
               data-cy="x-offset-slider">
        <span class="offset-value" data-cy="x-offset-value">{{ xOffset }}pt</span>
      </div>
      <div class="slider-row">
        <label for="y-offset-slider">Y Offset:</label>
        <input id="y-offset-slider"
               type="range"
               [min]="-maxYOffset"
               [max]="maxYOffset"
               [ngModel]="yOffset"
               (ngModelChange)="onYOffsetChange($event)"
               data-cy="y-offset-slider">
        <span class="offset-value" data-cy="y-offset-value">{{ yOffset }}pt</span>
      </div>

      <label class="json-edit-toggle">
        <input type="checkbox"
               [(ngModel)]="showLayoutJsonEditor"
               class="event-checkbox"
               data-cy="edit-layout-json">
        <span>Edit certificate JSON</span>
      </label>
      @if (showLayoutJsonEditor) {
        <textarea id="podium-layout-json"
                  class="certificate-layout-json"
                  [(ngModel)]="printService.podiumCertificateJson"
                  placeholder="Certificate template JSON..."
                  spellcheck="false"
                  autocorrect="off"
                  autocomplete="off"
                  data-cy="certificate-layout-json"></textarea>
      }
    </div>
  </div>
</div>
